name: Discord Release Notifier

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Embed
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            const release = context.payload.release;

            const title = release.name || release.tag_name;
            let desc = release.body || 'Sin descripcion disponible.';
            if (desc.length > 1500) { desc = desc.substring(0, 1497) + '...'; }

            const pad = (n) => n.toString().padStart(2, '0');
            const d = new Date(release.published_at);
            const date = `${pad(d.getUTCDate())}/${pad(d.getUTCMonth()+1)}/${d.getUTCFullYear()} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;

            let assetsList = 'No hay archivos adjuntos. Ver en [GitHub](<' + release.html_url + '>)';
            if (release.assets && release.assets.length > 0) {
              assetsList = release.assets.map(a => {
                const sizeMB = (a.size / (1024*1024)).toFixed(2);
                return '- [' + a.name + '](<' + a.browser_download_url + '>) (' + sizeMB + ' MB)';
              }).join('\n');
            }

            const payload = {
              embeds: [{
                title: 'Release: ' + title,
                url: release.html_url,
                description: desc,
                color: 3066993,
                fields: [
                  { name: 'Version',   value: release.tag_name, inline: true },
                  { name: 'Publicado', value: date,             inline: true },
                  { name: 'Descargas', value: assetsList,       inline: false }
                ],
                footer: {
                  text: 'GitHub Releases - NovariaMC',
                  icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
                },
                author: {
                  name: release.author.login,
                  icon_url: release.author.avatar_url,
                  url: release.author.html_url
                }
              }]
            };

            const res = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!res.ok) { throw new Error('Discord respondio con: ' + res.status); }
            console.log('Notificacion enviada exitosamente.');
